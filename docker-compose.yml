services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      # BUN_PUBLIC_* vars are inlined at build time — they must be forwarded
      # here so the bundler can embed them into the frontend bundle.
      # Set them in your .env file; docker compose passes them through automatically.
      args:
        BUN_PUBLIC_OPENPANEL_CLIENT_ID: ${BUN_PUBLIC_OPENPANEL_CLIENT_ID:-}
        BUN_PUBLIC_OPENPANEL_API_URL: ${BUN_PUBLIC_OPENPANEL_API_URL:-}
        BUN_PUBLIC_OTEL_SERVICE_NAME: ${BUN_PUBLIC_OTEL_SERVICE_NAME:-}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SERVER: db:5432
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      # BUN_PUBLIC_* vars are also forwarded at runtime so the server can
      # inject them into HTML via window.__APP_CONFIG__ (see backend/serveProdBuild.ts).
      # This makes them work in Coolify and other runtimes that don't pass build args.
      BUN_PUBLIC_OPENPANEL_CLIENT_ID: ${BUN_PUBLIC_OPENPANEL_CLIENT_ID:-}
      BUN_PUBLIC_OPENPANEL_API_URL: ${BUN_PUBLIC_OPENPANEL_API_URL:-}
      BUN_PUBLIC_OTEL_SERVICE_NAME: ${BUN_PUBLIC_OTEL_SERVICE_NAME:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:3000/healthcheck',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
