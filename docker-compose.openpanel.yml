x-common: &common
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: '3'

x-api-env: &api-env
  DATABASE_URL: postgres://postgres:${OP_POSTGRES_PASSWORD:-openpanel_pass}@op-db:5432/openpanel?schema=public
  REDIS_URL: redis://op-kv:6379
  CLICKHOUSE_URL: http://op-ch:8123/openpanel
  API_URL: http://localhost:8091/api
  DASHBOARD_URL: http://localhost:8091
  COOKIE_SECRET: ${OP_COOKIE_SECRET:-change-me-openpanel-secret-32chars!!}

services:
  op-proxy:
    <<: *common
    image: caddy:2-alpine
    container_name: op-proxy
    ports:
      - '8091:8091'
    volumes:
      - ./docker/openpanel/Caddyfile:/etc/caddy/Caddyfile
      - op-proxy-data:/data
      - op-proxy-config:/config
    depends_on:
      op-dashboard:
        condition: service_healthy
      op-api:
        condition: service_healthy

  op-db:
    <<: *common
    image: postgres:14-alpine
    container_name: op-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${OP_POSTGRES_PASSWORD:-openpanel_pass}
      - POSTGRES_DB=openpanel
    volumes:
      - op-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  op-kv:
    <<: *common
    image: redis:7.2.5-alpine
    container_name: op-kv
    volumes:
      - op-kv-data:/data
    command: ['redis-server', '--maxmemory-policy', 'noeviction']
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 10s
      timeout: 5s
      retries: 5

  op-ch:
    <<: *common
    image: clickhouse/clickhouse-server:25.4.2
    container_name: op-ch
    volumes:
      - op-ch-data:/var/lib/clickhouse
      - op-ch-logs:/var/log/clickhouse-server
      - ./docker/openpanel/clickhouse-config.xml:/etc/clickhouse-server/config.d/op-config.xml:ro
      - ./docker/openpanel/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/op-user-config.xml:ro
      - ./docker/openpanel/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    healthcheck:
      test: ['CMD-SHELL', 'clickhouse-client --query "SELECT 1"']
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  op-api:
    <<: *common
    image: lindesvard/openpanel-api:2
    container_name: op-api
    ports:
      - '3001:3000'
    command: >
      sh -c "
        echo 'Running migrations...'
        CI=true pnpm -r run migrate:deploy
        pnpm start
      "
    environment:
      <<: *api-env
      ALLOW_REGISTRATION: ${OP_ALLOW_REGISTRATION:-true}
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/healthcheck || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      op-db:
        condition: service_healthy
      op-ch:
        condition: service_healthy
      op-kv:
        condition: service_healthy

  op-dashboard:
    <<: *common
    image: lindesvard/openpanel-dashboard:2
    container_name: op-dashboard
    environment: *api-env
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:3000/api/healthcheck || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      op-api:
        condition: service_healthy

  op-worker:
    <<: *common
    image: lindesvard/openpanel-worker:2
    container_name: op-worker
    environment: *api-env
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/healthcheck || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      op-api:
        condition: service_healthy

networks:
  default:
    name: openpanel-net

volumes:
  op-db-data:
    name: op-db-data
  op-kv-data:
    name: op-kv-data
  op-ch-data:
    name: op-ch-data
  op-ch-logs:
    name: op-ch-logs
  op-proxy-data:
    name: op-proxy-data
  op-proxy-config:
    name: op-proxy-config
