name: PR Checks

on:
  pull_request:
    branches:
      - main
      - test
      - prod
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  test:
    name: Run Tests and Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🏗️ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧹 Run oxlint
        run: bun run lint

      - name: 🔍 Run React Compiler linting
        run: bun run lint:compiler

      - name: ✨ Check formatting
        run: bun run format:check

      - name: 🧪 Run tests
        run: bun test

      - name: 🏗️ Build project
        run: bun run build
