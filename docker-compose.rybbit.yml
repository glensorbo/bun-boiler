x-common: &common
  networks:
    - rybbit-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: '3'

services:
  rybbit-clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.4.2
    container_name: rybbit-clickhouse
    environment:
      - CLICKHOUSE_DB=analytics
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${RYBBIT_CLICKHOUSE_PASSWORD:-rybbit_click}
    volumes:
      - rybbit-clickhouse-data:/var/lib/clickhouse
      - rybbit-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: [CMD, wget, --spider, -q, 'http://localhost:8123/ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144

  rybbit-postgres:
    <<: *common
    image: postgres:17.4
    container_name: rybbit-postgres
    environment:
      - POSTGRES_DB=rybbit
      - POSTGRES_USER=rybbit
      - POSTGRES_PASSWORD=${RYBBIT_POSTGRES_PASSWORD:-rybbit_pass}
    volumes:
      - rybbit-postgres-data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -U rybbit']
      interval: 5s
      timeout: 5s
      retries: 5

  rybbit-backend:
    <<: *common
    image: ghcr.io/rybbit-io/backend:latest
    container_name: rybbit-backend
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLICKHOUSE_HOST=http://rybbit-clickhouse:8123
      - CLICKHOUSE_PASSWORD=${RYBBIT_CLICKHOUSE_PASSWORD:-rybbit_click}
      - POSTGRES_URL=postgresql://rybbit:${RYBBIT_POSTGRES_PASSWORD:-rybbit_pass}@rybbit-postgres:5432/rybbit
      - BETTER_AUTH_SECRET=${RYBBIT_AUTH_SECRET:-change-me-rybbit-secret-32chars!!}
      - BETTER_AUTH_URL=http://localhost:3001
      - BASE_URL=http://localhost:3002
      - DISABLE_SIGNUP=false
    depends_on:
      rybbit-clickhouse:
        condition: service_healthy
      rybbit-postgres:
        condition: service_healthy
    healthcheck:
      test: [CMD, wget, --spider, -q, 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rybbit-client:
    <<: *common
    image: ghcr.io/rybbit-io/client:latest
    container_name: rybbit-client
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
    depends_on:
      rybbit-backend:
        condition: service_healthy

networks:
  rybbit-net:
    name: rybbit-net

volumes:
  rybbit-clickhouse-data:
    name: rybbit-clickhouse-data
  rybbit-clickhouse-logs:
    name: rybbit-clickhouse-logs
  rybbit-postgres-data:
    name: rybbit-postgres-data
